name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Install cargo-wix
        run: cargo install cargo-wix --version 0.3.4 --locked

      - name: Ensure WiX Toolset 3 is on PATH
        run: |
          choco upgrade wixtoolset -y --no-progress
          echo "C:\Program Files (x86)\WiX Toolset v3.14\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build MSI installer
        run: cargo wix --no-build --nocapture

      - name: Compute SHA-256 hash
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 target/release/hyperxtools.exe).Hash.ToLower()
          "$hash  hyperxtools.exe" | Out-File -Encoding ascii -NoNewline target/release/hyperxtools.exe.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            target/release/hyperxtools.exe
            target/release/hyperxtools.exe.sha256
            target/wix/*.msi
