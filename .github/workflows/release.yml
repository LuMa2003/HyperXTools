name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Cache cargo-wix binary
        id: cache-cargo-wix
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-wix.exe
          key: cargo-wix-0.3.4

      - name: Install cargo-wix
        if: steps.cache-cargo-wix.outputs.cache-hit != 'true'
        run: cargo install cargo-wix --version 0.3.4 --locked

      - name: Install WiX Toolset 3
        run: |
          choco install wixtoolset -y --version=3.14.1 --allow-downgrade --no-progress
          echo "C:\Program Files (x86)\WiX Toolset v3.14\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build release
        run: cargo build --release

      - name: Build MSI installer
        run: cargo wix --no-build --nocapture

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            target/release/hyperxtools.exe
            target/wix/*.msi
